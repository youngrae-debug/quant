[project]
name = "quant-engine"
version = "0.1.0"
description = "Factor scoring and signal generation toolkit"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "numpy>=2.1.1,<3.0.0",
  "pandas>=2.2.3,<3.0.0"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
